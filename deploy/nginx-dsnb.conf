# R6 nginx vhost for dsnb.help.
# Drop into /etc/nginx/sites-enabled/dsnb on R6 (43.226.38.244).
# Phase 1 (this file): HTTP only — proxy to dsnb-web container on 127.0.0.1:18301.
# Phase 2 (after DNS A records propagate): run
#   certbot --nginx -d dsnb.help -d www.dsnb.help --non-interactive --agree-tos -m ops@lurus.cn
# certbot --nginx will mutate this file in place to add 443 ssl server block
# and redirect 80 → 443.

server {
    listen 80;
    server_name dsnb.help www.dsnb.help;

    client_max_body_size 5M;

    # Reserved path for ACME HTTP-01 challenge (certbot writes here).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:18301;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60;
    }
}
