services:
  dsnb-web:
    image: ghcr.io/hanmahong5-arch/2c-bs-dsnb:latest
    container_name: dsnb-web
    restart: unless-stopped
    # Bind to localhost only — R6 host nginx terminates TLS and reverse-proxies.
    ports:
      - "127.0.0.1:18301:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
